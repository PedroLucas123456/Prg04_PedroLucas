<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="container">
        <h1>LOGIN</h1>

        <div id="card">
            <form action="painel.html" method="post">
                <label id="usuario" for="username">Usuário:</label>
                <input type="email" id="username" name="username" placeholder="Seu email"  required><br><br>
                <label for="password">Senha:</label>
                <input type="password" id="password" name="password" placeholder="Sua senha" required><br><br>
                <input type="submit" value="Login">
            </form>
        </div>
        
    </div>
</body>
</html>
